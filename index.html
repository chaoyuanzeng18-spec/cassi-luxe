<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cassi-Luxe</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      font-family: 'Inter', sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }

    .card {
      max-width: 360px;
      width: 100%;
    }

    .hero img {
      width: 100px;
      height: 100px;
      border-radius: 20px;
      object-fit: cover;
      margin: 0 auto 20px;
      display: block;
    }

    .content h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 600;
      color: #FFD700; /* 金色 */
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 15px;
      color: #FFF;
    }

    .desc {
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 20px;
      color: #FFF;
    }

    .button {
      display: inline-block;
      background-color: #00C853; /* 明亮绿色 */
      color: #fff;
      text-decoration: none;
      padding: 12px 25px;
      font-weight: 600;
      font-size: 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      transition: background 0.3s;
    }

    .button:hover {
      background-color: #00e676;
    }

    .footer {
      font-size: 10px;
      letter-spacing: 2px;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="hero">
      <img src="logo.jpg" alt="Cassi-Luxe">
    </div>
    <div class="content">
      <h1>Cassi-Luxe</h1>
      <div class="subtitle">PRIVATE LUXURY CONCIERGE</div>
      <div class="desc">
        A curated world of exclusive fashion,<br>
        rare collections, and elevated private sourcing.<br>
        Designed for clients who value discretion,<br>
        prestige, and timeless luxury.<br>
        Worldwide private service available 24/7.
      </div>
      <!-- CTA 按钮 -->
      <a id="cta-button" class="button" target="_blank">Enter Private Access</a>
    </div>
    <div class="footer">EXCLUSIVE • ELEVATED • WORLDWIDE</div>
  </div>

  <!-- Meta Pixel -->
  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1527651868565912'); // 替换为你的 Pixel ID
    fbq('track', 'PageView');
  </script>

  <!-- CTA 点击触发 Lead -->
  <script>
    const BUTTON_TEXT = "Enter Private Access";
    const BUTTON_URL = "https://ads.cdysc.com/w/1DwCRM";

    const cta = document.getElementById('cta-button');
    cta.textContent = BUTTON_TEXT;
    cta.href = BUTTON_URL;

    cta.addEventListener('click', () => {
      fbq('track', 'Lead');
    });
  </script>

  <noscript>
    <img height="1" width="1" style="display:none"
         src="https://www.facebook.com/tr?id=1527651868565912&ev=PageView&noscript=1"/>
  </noscript>
</body>
</html>
