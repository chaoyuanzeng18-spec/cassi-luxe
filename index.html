<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cassi-Luxe</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Meta Pixel Base Code -->
  <script>
    !function(f,b,e,v,n,t,s){
      if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)
    }(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '你的像素ID'); // <-- 这里替换成你的 Pixel ID
    fbq('track', 'PageView');
  </script>
  <noscript>
    <img height="1" width="1" style="display:none"
         src="https://www.facebook.com/tr?id=你的像素ID&ev=PageView&noscript=1"/>
  </noscript>

  <!-- CSS -->
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body{
      background:#050505;
      font-family:'Inter',sans-serif;
      color:white;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:20px;
      text-align:center;
    }
    img { max-width:200px; margin-bottom:20px; }
    h1 { font-family:'Cormorant Garamond', serif; font-size:2.5rem; margin-bottom:10px; }
    .subtitle { font-weight:500; margin-bottom:15px; }
    .desc { font-size:1rem; line-height:1.5; margin-bottom:25px; }
    .button {
      display:inline-block;
      padding:12px 24px;
      background:#FF4500;
      color:white;
      font-weight:600;
      text-decoration:none;
      border-radius:5px;
      transition:0.3s;
    }
    .button:hover { background:#e03e00; }
    .footer { margin-top:40px; font-size:0.85rem; color:#aaa; }
  </style>
</head>
<body>

  <img src="logo.jpg" alt="Cassi Luxe Logo">
  <h1>Cassi-Luxe</h1>
  <div class="subtitle">PRIVATE LUXURY CONCIERGE</div>
  <div class="desc">
    A curated world of exclusive fashion,<br>
    rare collections, and elevated private sourcing.<br>
    Designed for clients who value discretion,<br>
    prestige, and timeless luxury.<br>
    Worldwide private service available 24/7.
  </div>

  <a id="cta-button" class="button" href="#" target="_blank">Enter Private Access</a>

  <div class="footer">
    EXCLUSIVE • ELEVATED • WORLDWIDE
  </div>

  <!-- CTA + Meta Pixel Lead Event -->
  <script>
    const BUTTON_TEXT = "Enter Private Access"; // 文案
    const BUTTON_URL = "https://ads.cdysc.com/w/1DwCRM"; // 点击跳转

    const cta = document.getElementById('cta-button');
    cta.textContent = BUTTON_TEXT;
    cta.href = BUTTON_URL;

    // 点击触发 Pixel Lead 事件
    cta.addEventListener('click', () => {
      fbq('track', 'Lead');
    });
  </script>

</body>
</html>
