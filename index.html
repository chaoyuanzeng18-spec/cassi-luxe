<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cassi-Luxe</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}
body{
  background:#050505;
  font-family:'Inter',sans-serif;
  color:white;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  overflow:hidden;
  position:relative;
}
body::before{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(255,255,255,.04);
  pointer-events:none;
}
/* 这里可以加入你现有的样式 */
</style>

<!-- Meta Pixel Code -->
<script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  
  fbq('init', '123456789012345'); // <-- 示例 Pixel ID
  fbq('track', 'PageView');
</script>
<noscript><img height="1" width="1" style="display:none"
  src="https://www.facebook.com/tr?id=123456789012345&ev=PageView&noscript=1"
/></noscript>
<!-- End Meta Pixel Code -->

</head>
<body>

<div class="card">

  <div class="hero">
    <img src="logo.jpg" alt="Cassi Luxe">
  </div>

  <div class="content">
    <h1>Cassi-Luxe</h1>
    <div class="subtitle">PRIVATE LUXURY CONCIERGE</div>
    <div class="desc">
      A curated world of exclusive fashion,<br>
      rare collections, and elevated private sourcing.<br>
      Designed for clients who value discretion,<br>
      prestige, and timeless luxury.<br>
      Worldwide private service available 24/7.
    </div>

    <!-- 按钮点击触发 Meta Pixel Lead 事件 -->
    <a id="cta-button" class="button" target="_blank">
      Enter Private Access
    </a>
  </div>

  <div class="footer">
    EXCLUSIVE • ELEVATED • WORLDWIDE
  </div>

</div>

<script>
  // 按钮动态填充文本和链接
  const BUTTON_TEXT = "Enter Private Access"; // 文案
  const BUTTON_URL = "https://ads.cdysc.com/w/1DwCRM"; // 跳转链接

  const cta = document.getElementById('cta-button');
  cta.textContent = BUTTON_TEXT;
  cta.href = BUTTON_URL;

  // 点击按钮触发 Meta Pixel Lead 事件
  cta.addEventListener('click', () => {
    fbq('track', 'Lead');
  });
</script>

</body>
</html>
