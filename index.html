<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cassi-Luxe</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #111;
      font-family: 'Inter', sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .logo-container {
      margin-bottom: 20px;
    }

    .logo-container img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 16px;
    }

    h1 {
      font-size: 2em;
      color: #FFD700; /* 金色 */
      margin: 0;
    }

    .subtitle {
      font-size: 0.85em;
      letter-spacing: 1px;
      margin: 8px 0;
      color: #fff;
      font-weight: 600;
    }

    .desc {
      font-size: 0.9em;
      line-height: 1.5em;
      margin: 10px 0 20px 0;
      color: #fff;
    }

    .cta-button {
      display: inline-block;
      background-color: #00c853; /* 绿色按钮 */
      color: white;
      font-weight: 600;
      padding: 12px 32px;
      border-radius: 8px;
      text-decoration: none;
      margin-bottom: 20px;
      transition: background-color 0.2s;
    }

    .cta-button:hover {
      background-color: #00e676;
    }

    .footer {
      font-size: 0.7em;
      letter-spacing: 2px;
      color: #fff;
    }

    /* 响应式移动端优化 */
    @media (max-width: 480px) {
      .logo-container img {
        width: 150px;
        height: 150px;
      }
      h1 {
        font-size: 1.5em;
      }
      .desc {
        font-size: 0.8em;
        line-height: 1.4em;
      }
      .cta-button {
        padding: 10px 24px;
        font-size: 0.9em;
      }
    }
  </style>
  <!-- Meta Pixel 基础代码 -->
  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1527651868565912'); // 你的 Pixel ID
    fbq('track', 'PageView');
  </script>
</head>
<body>
  <div class="logo-container">
    <img src="logo.jpg" alt="Cassi-Luxe">
  </div>

  <h1>Cassi-Luxe</h1>
  <div class="subtitle">PRIVATE LUXURY CONCIERGE</div>
  <div class="desc">
    A curated world of exclusive fashion,<br>
    rare collections, and elevated private sourcing.<br>
    Designed for clients who value discretion,<br>
    prestige, and timeless luxury.<br>
    Worldwide private service available 24/7.
  </div>

  <a id="cta-button" class="cta-button" href="https://ads.cdysc.com/w/1DwCRM" target="_blank">
    Enter Private Access
  </a>

  <div class="footer">EXCLUSIVE • ELEVATED • WORLDWIDE</div>

  <script>
    // Meta Pixel Lead 事件
    const cta = document.getElementById('cta-button');
    cta.addEventListener('click', () => {
      fbq('track', 'Lead');
    });
  </script>
</body>
</html>
