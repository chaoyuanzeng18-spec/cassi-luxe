<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cassi-Luxe</title>

    <!-- ============================= -->
    <!-- Meta Pixel Code -->
    <!-- ============================= -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', 'YOUR_PIXEL_ID'); // <-- 替换为你的 Meta Pixel ID
      fbq('track', 'PageView');
    </script>
    <noscript>
      <img height="1" width="1" style="display:none"
           src="https://www.facebook.com/tr?id=YOUR_PIXEL_ID&ev=PageView&noscript=1"/>
    </noscript>
    <!-- End Meta Pixel Code -->
    <!-- ============================= -->

    <style>
        body { font-family: Arial, sans-serif; background: #000; color: #fff; margin: 0; }
        .card { max-width: 600px; margin: 50px auto; text-align: center; }
        .hero img { max-width: 200px; margin-bottom: 20px; }
        .subtitle { font-size: 14px; color: #aaa; margin-bottom: 10px; }
        .desc { font-size: 16px; line-height: 1.5; margin-bottom: 20px; }
        .button { display: inline-block; padding: 10px 20px; background: #f60; color: #fff; text-decoration: none; border-radius: 5px; }
        .footer { margin-top: 30px; font-size: 12px; color: #777; }
    </style>
</head>
<body>

<!-- ========== 可修改变量 ========== -->
<script>
    // 落地页按钮文案和跳转链接
    const BUTTON_TEXT = "Enter Private Access"; // 按钮文案
    const BUTTON_URL = "https://ads.cdysc.com/w/1DwCRM"; // 按钮跳转链接
</script>

<div class="card">
    <div class="hero">
        <img src="logo.jpg" alt="Cassi Luxe">
    </div>

    <div class="content">
        <h1>Cassi-Luxe</h1>
        <div class="subtitle">PRIVATE LUXURY CONCIERGE</div>
        <div class="desc">
            A curated world of exclusive fashion,
            rare collections, and elevated private sourcing.
            Designed for clients who value discretion,
            prestige, and timeless luxury.
            Worldwide private service available 24/7.
        </div>

        <!-- 按钮点击触发 Meta Pixel Lead 事件 -->
        <a id="cta-button" class="button" target="_blank">
            <!-- 文案 JS 动态填充 -->
        </a>
    </div>

    <div class="footer">
        EXCLUSIVE • ELEVATED • WORLDWIDE
    </div>
</div>

<script>
    // 将按钮文案和链接动态填充
    const cta = document.getElementById('cta-button');
    cta.textContent = BUTTON_TEXT;
    cta.href = BUTTON_URL;

    // 点击按钮触发 Meta Pixel Lead 事件
    cta.addEventListener('click', () => {
        fbq('track', 'Lead');
    });
</script>

</body>
</html>
