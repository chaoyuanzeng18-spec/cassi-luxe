<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cassi-Luxe</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050505;
      font-family: 'Inter', sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    .card { max-width: 400px; }
    .hero img { width: 150px; margin-bottom: 20px; }
    .content h1 { font-family: 'Cormorant Garamond', serif; font-size: 32px; margin-bottom: 10px; }
    .subtitle { font-size: 14px; font-weight: 600; margin-bottom: 15px; letter-spacing: 1px; }
    .desc { font-size: 14px; line-height: 1.6; margin-bottom: 25px; }
    .button {
      display: inline-block;
      padding: 12px 25px;
      background: #FF5A1F;
      color: white;
      text-decoration: none;
      font-weight: 600;
      border-radius: 4px;
      transition: background 0.3s;
    }
    .button:hover { background: #e14b10; }
    .footer { margin-top: 20px; font-size: 12px; color: #ccc; letter-spacing: 1px; }
  </style>
</head>
<body>

  <div class="card">
    <div class="hero">
      <img src="logo.jpg" alt="Cassi-Luxe">
    </div>

    <div class="content">
      <h1>Cassi-Luxe</h1>
      <div class="subtitle">PRIVATE LUXURY CONCIERGE</div>
      <div class="desc">
        A curated world of exclusive fashion,<br>
        rare collections, and elevated private sourcing.<br>
        Designed for clients who value discretion,<br>
        prestige, and timeless luxury.<br>
        Worldwide private service available 24/7.
      </div>

      <!-- 按钮点击触发 Meta Pixel Lead -->
      <a id="cta-button" class="button" target="_blank">
        Enter Private Access
      </a>
    </div>

    <div class="footer">EXCLUSIVE • ELEVATED • WORLDWIDE</div>
  </div>

  <!-- Meta Pixel -->
  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '你的像素ID'); // ← 改成你的 Meta Pixel ID
    fbq('track', 'PageView');
  </script>
  <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=你的像素ID&ev=PageView&noscript=1"
  /></noscript>

  <!-- 按钮动态填充文本和触发 Lead -->
  <script>
    const BUTTON_TEXT = "Enter Private Access"; // 按钮文案
    const BUTTON_URL = "https://ads.cdysc.com/w/1DwCRM"; // 跳转链接

    const cta = document.getElementById('cta-button');
    cta.textContent = BUTTON_TEXT;
    cta.href = BUTTON_URL;

    // 点击按钮触发 Meta Pixel Lead 事件
    cta.addEventListener('click', () => {
      fbq('track', 'Lead');
    });
  </script>

</body>
</html>
